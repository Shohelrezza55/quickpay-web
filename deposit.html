<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit - QuickPay BD</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050a18; --bkash: #e2136e; --nagad: #f7941d; --neon: #00f2ff; }
        body { background: var(--bg); font-family: 'Poppins', sans-serif; color: white; padding: 20px; margin: 0; }
        .card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); max-width: 450px; margin: auto; backdrop-filter: blur(10px); }
        .num-box { padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid; cursor: pointer; background: rgba(255,255,255,0.03); }
        .box-bkash { border-left-color: var(--bkash); }
        .box-nagad { border-left-color: var(--nagad); }
        input, select { width: 100%; padding: 14px; margin-top: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: white; outline: none; box-sizing: border-box; }
        .upload-area { margin-top: 15px; border: 2px dashed #444; padding: 20px; text-align: center; border-radius: 15px; cursor: pointer; }
        #screenshot { display: none; }
        #preview { width: 100%; max-height: 200px; display: none; border-radius: 10px; margin-top: 10px; }
        .btn { width: 100%; padding: 18px; margin-top: 25px; border: none; border-radius: 15px; background: linear-gradient(45deg, #1e3799, var(--neon)); color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn:disabled { opacity: 0.5; }
    </style>
</head>
<body>

<div class="card">
    <h3 style="text-align:center; color: var(--neon); margin-bottom: 20px;">ডিপোজিট করুন</h3>
    
    <div class="num-box box-bkash" onclick="copy('bkash_val')">
        <div><span>Bkash (P)</span><br><b id="bkash_val">লোড হচ্ছে...</b></div>
        <i class="fas fa-copy"></i>
    </div>
    <div class="num-box box-nagad" onclick="copy('nagad_val')">
        <div><span>Nagad (P)</span><br><b id="nagad_val">লোড হচ্ছে...</b></div>
        <i class="fas fa-copy"></i>
    </div>

    <select id="method">
        <option value="Bkash">Bkash</option>
        <option value="Nagad">Nagad</option>
    </select>
    <input type="number" id="sender" placeholder="আপনার নম্বর">
    <input type="number" id="amount" placeholder="টাকার পরিমাণ">
    <input type="text" id="txid" placeholder="Transaction ID (TxID)">
    
    <div class="upload-area" onclick="document.getElementById('screenshot').click()">
        <i class="fas fa-camera" style="font-size: 30px; color: var(--neon);"></i>
        <p id="fileStatus">পেমেন্ট স্ক্রিনশট সিলেক্ট করুন</p>
        <input type="file" id="screenshot" accept="image/*" onchange="showPreview(this)">
        <img id="preview" alt="Preview">
    </div>
    
    <button class="btn" id="subBtn" onclick="submitDeposit()">কনফার্ম রিকোয়েস্ট 🚀</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://quickpaybd-8b8d0-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // অ্যাডমিন থেকে নম্বর লোড করা
    db.ref('admin_settings').on('value', s => {
        const d = s.val();
        if(d){
            document.getElementById('bkash_val').innerText = d.bkash || "বন্ধ";
            document.getElementById('nagad_val').innerText = d.nagad || "বন্ধ";
        }
    });

    function showPreview(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const preview = document.getElementById('preview');
                preview.src = e.target.result;
                preview.style.display = 'block';
                document.getElementById('fileStatus').innerText = "ছবি সিলেক্ট হয়েছে ✅";
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function submitDeposit() {
        const user = localStorage.getItem("savedUser");
        const amt = document.getElementById('amount').value;
        const tid = document.getElementById('txid').value;
        const sen = document.getElementById('sender').value;
        const meth = document.getElementById('method').value;
        const fileInput = document.getElementById('screenshot');
        const btn = document.getElementById('subBtn');

        if(!user) return alert("লগইন করা নেই!");
        if(!amt || !tid || !sen || !fileInput.files[0]) return alert("সব তথ্য ও ছবি দিন!");
        
        btn.disabled = true; btn.innerText = "পাঠানো হচ্ছে...";

        // টেলিগ্রাম তথ্য
        const botToken = "7725946897:AAHLBfX2k2fO6u_yW3165ZqFp2F-Ew_M57E";
        const chatId = "7414008169";
        const caption = `💰 <b>নতুন ডিপোজিট রিকোয়েস্ট!</b>\n\n👤 ইউজার: ${user}\n💵 পরিমাণ: ${amt} TK\n🔑 TxID: ${tid}\n📱 প্রেরক: ${sen}\n💳 মেথড: ${meth}`;

        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('photo', fileInput.files[0]);
        formData.append('caption', caption);
        formData.append('parse_mode', 'HTML');

        try {
            // ১. টেলিগ্রামে পাঠানো
            const response = await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                method: 'POST',
                body: formData
            });

            // ২. অ্যাডমিন প্যানেলের জন্য ডাটাবেসে রিকোয়েস্ট সেভ করা
            await db.ref('deposits').push({
                user: user,
                amount: parseFloat(amt),
                txid: tid,
                sender: sen,
                method: meth,
                status: "pending",
                time: new Date().toLocaleString('bn-BD')
            });

            alert("সফল হয়েছে! অ্যাডমিন অ্যাপ্রুভ করার জন্য অপেক্ষা করুন।");
            window.location.replace("dashboard.html");

        } catch(e) { 
            console.error(e);
            alert("ত্রুটি হয়েছে! আবার চেষ্টা করুন।"); 
            btn.disabled = false; btn.innerText = "কনফার্ম রিকোয়েস্ট 🚀";
        }
    }

    function copy(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);
        alert("নম্বর কপি হয়েছে: " + text);
    }
</script>
</body>
</html>
