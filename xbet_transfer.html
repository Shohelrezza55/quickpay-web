<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1xBet Transfer - QuickPay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #050a18; font-family: 'Poppins', sans-serif; color: white; padding: 20px; }
        .card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        h3 { text-align: center; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        input { width: 100%; padding: 14px; margin-top: 10px; border-radius: 12px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: #00f2ff; }
        .btn { width: 100%; padding: 18px; margin-top: 25px; border: none; border-radius: 15px; background: linear-gradient(45deg, #00f2ff, #0088cc); color: #000; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h3>🎮 1xBet ID Load</h3>
        <input type="number" id="id" placeholder="প্লেয়ার আইডি (1xBet ID)">
        <input type="number" id="am" placeholder="টাকার পরিমাণ (৳)">
        <button class="btn" onclick="transfer()">আইডি লোড করুন 🚀</button>
    </div>

    <script>
        // ১. ফায়ারবেস কনফিগ (আপনার ডাটাবেস ইউআরএল)
        const firebaseConfig = { databaseURL: "https://quickpaybd-8b8d0-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ২. আপনার নতুন টেলিগ্রাম বট তথ্য
        const botToken = "8493207328:AAGTpvGw5C-wa2lpMANjOXNxHX1ro_AKs6Q";
        const chatId = "6875220034";

        function transfer() {
            const user = localStorage.getItem("savedUser");
            const xbetId = document.getElementById('id').value;
            const amount = parseFloat(document.getElementById('am').value);

            if(!user) return alert("লগইন সমস্যা! আবার লগইন করুন।");
            if(!xbetId || !amount) return alert("আইডি এবং টাকার পরিমাণ দিন!");

            // ৩. ইউজারের ব্যালেন্স চেক করা
            db.ref('users/' + user).once('value', s => {
                if(!s.exists()) return alert("ইউজার পাওয়া যায়নি!");
                
                const currentBal = s.val().balance || 0;

                if(currentBal >= amount) {
                    // ৪. ব্যালেন্স কাটা (Update Database)
                    const newBal = currentBal - amount;
                    db.ref('users/' + user).update({ balance: newBal }).then(() => {
                        
                        // ৫. টেলিগ্রাম নোটিফিকেশন পাঠানো
                        const message = `🎮 **নতুন ১এক্সবেট লোড রিকোয়েস্ট!**\n\n👤 ইউজার: ${user}\n🆔 ১এক্সবেট আইডি: ${xbetId}\n💵 পরিমাণ: ${amount} ৳\n✅ স্ট্যাটাস: ব্যালেন্স কাটা হয়েছে।`;

                        fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}&parse_mode=Markdown`)
                        .then(res => {
                            alert("সফল! আপনার রিকোয়েস্ট পাঠানো হয়েছে।");
                            window.location.replace("dashboard.html");
                        })
                        .catch(err => {
                            alert("মেসেজ পাঠাতে সমস্যা হচ্ছে, তবে ব্যালেন্স কাটা হয়েছে।");
                        });

                    });
                } else {
                    alert("আপনার ব্যালেন্স পর্যাপ্ত নয়! বর্তমান ব্যালেন্স: " + currentBal);
                }
            });
        }
    </script>
</body>
</html>
